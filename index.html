<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chelsea Cyber Bot AI</title>
    <style>
        /* ====================================
           ESTÉTICA CYBERPUNK OSCURA (CSS)
           ==================================== */
        :root {
            --neon-green: #0f0;
            --neon-cyan: #0ff;
            --neon-magenta: #f0f;
            --bg-dark: #050505;
            --bg-panel: #0a0a0a;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            font-family: var(--font-mono);
            background: var(--bg-dark);
            color: var(--neon-green);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--bg-panel);
            width: 100%;
            max-width: 800px;
            height: 90vh;
            border: 2px solid var(--neon-green);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4), inset 0 0 10px rgba(0, 255, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 15px;
            border-bottom: 2px solid var(--neon-green);
            background: #001100;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 8px var(--neon-green);
            letter-spacing: 2px;
        }

        /* Historial de Chat */
        .chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Burbuja del Usuario (Cian) */
        .user-bubble {
            align-self: flex-end;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            background: rgba(0, 255, 255, 0.05);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            text-shadow: 0 0 2px var(--neon-cyan);
        }

        /* Burbuja de la IA (Magenta) */
        .ai-bubble {
            align-self: flex-start;
            border: 1px solid var(--neon-magenta);
            color: var(--neon-magenta);
            background: rgba(255, 0, 255, 0.05);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
            text-shadow: 0 0 2px var(--neon-magenta);
        }

        .chat-img {
            max-width: 100%;
            border-radius: 5px;
            margin-top: 10px;
            border: 1px solid currentColor;
        }

        /* Área de Input */
        .input-area {
            padding: 15px;
            border-top: 2px solid var(--neon-green);
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        textarea, input[type="file"], button {
            background: #000;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px;
            font-family: var(--font-mono);
            border-radius: 5px;
            outline: none;
        }

        textarea {
            resize: none;
            height: 60px;
            transition: 0.3s;
        }

        textarea:focus {
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        input[type="file"] {
            cursor: pointer;
        }

        button {
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
            flex: 1;
        }

        #askBtn:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green);
        }

        #clearBtn {
            border-color: #ef4444;
            color: #ef4444;
        }

        #clearBtn:hover {
            background: #ef4444;
            color: #000;
            box-shadow: 0 0 15px #ef4444;
        }

        /* Scrollbar Cyberpunk */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { 
            background: var(--neon-green); 
            border-radius: 4px; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">🤖 Chelsea Cyber Bot AI // v1.0</div>

    <div id="chatHistory" class="chat-history">
        <div class="bubble ai-bubble">
            <strong>SYSTEM:</strong><br/>Conexión establecida. Esperando comandos o carga de imágenes...
        </div>
    </div>

    <div class="input-area">
        <input type="file" id="imageInput" accept="image/*" title="Cargar imagen para análisis">
        
        <textarea id="promptInput" placeholder=">_ Ingresa tu comando o pregunta aquí..."></textarea>
        
        <div class="controls">
            <button id="askBtn">🚀 EJECUTAR COMANDO</button>
            <button id="clearBtn">🧹 PURGAR MEMORIA</button>
        </div>
    </div>
</div>

<script>
    /* ====================================
       LÓGICA JAVASCRIPT (MULTIMODAL)
       ==================================== */
    
    // API Key (Mantenida de tu código original)
   const parte1 = "AQ.Ab8RN6LwCJjgBuGgH4jcJceK";
const parte2 = "SfrtctE3Zd7ghNJzOukv6O6yGQ";
const API_KEY = parte1 + parte2;
    const MODELS = [
        "gemini-2.5-flash", // Prioridad 1: Modelo rápido y excelente para imágenes
        "gemini-3-flash-preview",
        "gemini-2.5-pro"
    ];

    const askBtn = document.getElementById("askBtn");
    const clearBtn = document.getElementById("clearBtn");
    const promptInput = document.getElementById("promptInput");
    const imageInput = document.getElementById("imageInput");
    const chatHistory = document.getElementById("chatHistory");

    // 1. Función para convertir archivo de imagen a Base64
    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]); // Extraer solo la data sin el prefijo
            reader.onerror = error => reject(error);
        });
    }

    // 2. Función para inyectar burbujas de chat en la interfaz
    function addMessage(sender, text, imgBase64 = null) {
        const bubble = document.createElement("div");
        bubble.classList.add("bubble", sender === 'user' ? "user-bubble" : "ai-bubble");
        
        let content = `<strong>${sender === 'user' ? 'USER' : 'SYSTEM'}:</strong><br/>${text}`;
        
        if (imgBase64) {
            content += `<br/><img src="data:image/jpeg;base64,${imgBase64}" class="chat-img">`;
        }
        
        bubble.innerHTML = content;
        chatHistory.appendChild(bubble);
        chatHistory.scrollTop = chatHistory.scrollHeight; // Auto-scroll al fondo
    }

    // 3. Función principal para conectar con Gemini
    async function askGemini() {
        const prompt = promptInput.value.trim();
        const file = imageInput.files[0];

        if (!prompt && !file) {
            alert("⚠️ Ingresa un comando de texto o carga una imagen.");
            return;
        }

        let base64Image = null;
        let mimeType = null;

        // Procesar imagen si existe
        if (file) {
            base64Image = await fileToBase64(file);
            mimeType = file.type;
        }

        // Mostrar el mensaje del usuario en pantalla inmediatamente
        addMessage('user', prompt || "[Imagen cargada sin instrucciones]", base64Image);
        
        // Limpiar inputs
        promptInput.value = "";
        imageInput.value = "";
        
        // Bloquear botón y mostrar carga
        askBtn.disabled = true;
        askBtn.innerText = "⏳ PROCESANDO...";

        // Preparar el cuerpo de la petición (soporta texto e imagen a la vez)
        let parts = [];
        if (prompt) {
            parts.push({ text: prompt });
        }
        if (base64Image) {
            parts.push({
                inline_data: {
                    mime_type: mimeType,
                    data: base64Image
                }
            });
        }

        let success = false;

        // Ciclo for para intentar con la lista de modelos
        for (let model of MODELS) {
            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`,
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: parts }]
                        })
                    }
                );

                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }

                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;

                // Mostrar respuesta de la IA
                addMessage('ai', result);
                success = true;
                break; // Si es exitoso, rompe el ciclo for

            } catch (error) {
                console.warn(`❌ Falló el modelo ${model}`, error);
            }
        }

        if (!success) {
            addMessage('ai', "❌ [ERROR] Falla en la conexión con los servidores de la IA o API Key inválida.");
        }

        // Restaurar botón
        askBtn.disabled = false;
        askBtn.innerText = "🚀 EJECUTAR COMANDO";
    }

    // 4. Eventos
    askBtn.addEventListener("click", askGemini);

    clearBtn.addEventListener("click", () => {
        chatHistory.innerHTML = `<div class="bubble ai-bubble"><strong>SYSTEM:</strong><br/>Memoria purgada. Sistema listo.</div>`;
    });

    // Permitir enviar con "Enter" si no se presiona Shift
    promptInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            askGemini();
        }
    });

</script>
</body>
</html>
